version: "3.9"

services:
  postgres:
    image: pgrouting/pgrouting:latest
    container_name: traffic-sim-db
    environment:
      POSTGRES_DB: traffic_sim
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic -d traffic_sim"]
      interval: 5s
      timeout: 5s
      retries: 5

  dekart:
    image: dekartxyz/dekart:latest
    container_name: traffic-sim-dekart
    environment:
      DEKART_DATASOURCE: PG
      DEKART_POSTGRES_DATASOURCE_CONNECTION: postgres://traffic:traffic123@postgres:5432/traffic_sim?sslmode=disable
      DEKART_PORT: "8080"
      DEKART_MAPBOX_TOKEN: ""
    ports:
      - "8080:8080"
    volumes:
      - dekart-data:/dekart/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  dekart-data:
